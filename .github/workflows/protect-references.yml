# Reject PRs that hand-edit anything under references/.
# references/ is generated by aumm-site's skill-publish workflow; humans should
# never modify it directly.
name: Protect references/

on:
  pull_request:
    paths:
      - "references/**"

permissions:
  contents: read

jobs:
  protect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify DO-NOT-EDIT headers
        run: |
          set -euo pipefail
          missing=0
          while IFS= read -r -d '' f; do
            if ! head -n 1 "$f" | grep -q "GENERATED FROM aumm-site@.*— DO NOT EDIT"; then
              echo "::error file=$f::missing DO-NOT-EDIT header — references/ files must be generated, not hand-written"
              missing=$((missing + 1))
            fi
          done < <(find references -type f -name "*.md" -print0)
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing file(s) in references/ are missing the DO-NOT-EDIT header."
            echo "::error::Regenerate via: python3 scripts/generate_llms_manifest.py --skill-out <path> in aumm-site."
            exit 1
          fi

      - name: Verify _canon.json present
        run: |
          if [ ! -f references/_canon.json ]; then
            echo "::error::references/_canon.json missing. The lockfile must be present and up to date."
            exit 1
          fi
